name: Refresh Content Cache

on:
  schedule:
    - cron: '0 7 * * *'  # 2 AM Eastern (7 AM UTC during EDT)
  workflow_dispatch:       # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Refresh disk cache
        env:
          GITHUB_TOKEN: ${{ secrets.RESOURCE_REPO_TOKEN }}
        run: |
          node -e "
            process.env.GITHUB_TOKEN = process.env.GITHUB_TOKEN;
            const content = require('./src/server/content');
            content.warmDiskCache().then(() => {
              console.log('Cache refresh complete');
            }).catch(err => {
              console.error('Cache refresh failed:', err.message);
              process.exit(1);
            });
          "

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/.file-cache/
          if git diff --staged --quiet; then
            echo "No cache changes — skipping commit"
          else
            git commit -m "Refresh content cache [automated]"
            git push
          fi
