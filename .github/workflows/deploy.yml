name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          docker build -t gcr.io/noble-imprint-website/resource-website .
          docker push gcr.io/noble-imprint-website/resource-website

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy resource-website \
            --image gcr.io/noble-imprint-website/resource-website \
            --platform managed \
            --region us-central1 \
            --project=noble-imprint-website
